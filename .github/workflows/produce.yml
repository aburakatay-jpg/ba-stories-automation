name: BA Stories - Haftalık Üretim

on:
  schedule:
    # Her Pazartesi 09:00 (Türkiye saati, TSİ = UTC+3) -> UTC 06:00
    - cron: '0 6 * * 2,5'
  workflow_dispatch: {}   # istersen "Actions" sekmesinden elle de tetikleyebilirsin

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları kur
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install edge-tts requests

      - name: Hikaye çek ve senaryo yaz (Groq)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/generate_script.py

      - name: Seslendirme üret (Edge-TTS)
        run: python scripts/generate_tts.py output/senaryo.txt output/ses.mp3

      - name: Video kurgula (FFmpeg, 16:9 zorlanmış)
        run: python scripts/assemble_video.py backgrounds/yatay output/ses.mp3 output/video.mp4 music vid_
      - name: Thumbnail üret
        run: python scripts/generate_thumbnail.py output/tema.json output/baslik.txt output/thumbnail.jpg

      - name: Thumbnail üret
        run: python scripts/generate_thumbnail.py output/tema.json output/baslik.txt output/thumbnail.jpg

      - name: Thumbnail üret
        run: python scripts/generate_thumbnail.py output/tema.json output/baslik.txt output/thumbnail.jpg

      - name: Thumbnail üret
        run: python scripts/generate_thumbnail.py output/tema.json output/baslik.txt output/thumbnail.jpg

      - name: Videoyu artifact olarak sakla
        uses: actions/upload-artifact@v4
        with:
          name: video-cikti
          path: output/
          retention-days: 14

      - name: Seri sayacı ve tema geçmişini kaydet
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add scripts/seri_bilgisi.json scripts/tema_gecmisi.json
          git diff --staged --quiet || git commit -m "seri sayaci ve tema gecmisi guncellendi [skip ci]"
          git push

  onay_ve_yukleme:
    needs: generate
    runs-on: ubuntu-latest
    environment: youtube-upload   # bu environment'ta "Required reviewers" açık olacak
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: video-cikti
          path: output/

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları kur
        run: pip install google-api-python-client google-auth google-auth-oauthlib

      - name: YouTube'a yükle
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: python scripts/upload_youtube.py output/video.mp4 output/baslik.txt output/aciklama.txt output/thumbnail.jpg output/playlist_id.txt
        bildirim:
    needs: [generate, onay_ve_yukleme]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Hata bildirimi gönder
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ BA Stories üretim hatası%0A%0AWorkflow: ${{ github.workflow }}%0ARun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}%0A%0AHatayı incelemek için linke tıkla."