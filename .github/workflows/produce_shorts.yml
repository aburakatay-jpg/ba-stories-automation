name: BA Stories - Shorts Üretim

on:
  schedule:
    # Pazartesi, Çarşamba, Perşembe, Cumartesi, Pazar - 09:00 TR saati (UTC 06:00)
    - cron: '0 6 * * 1,3,4,6,0'
  workflow_dispatch: {}

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları kur
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install edge-tts requests

      - name: Kısa senaryo yaz (Groq)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/generate_script_shorts.py

      - name: Seslendirme üret (Edge-TTS)
        run: python scripts/generate_tts.py output/senaryo.txt output/ses.mp3

      - name: Thumbnail/görsel üret
        run: python scripts/generate_thumbnail.py output/tema.json output/baslik.txt output/thumbnail.jpg

      - name: Short'u kurgula (Ken Burns efekti, FFmpeg)
        run: python scripts/assemble_video_shorts.py output/thumbnail.jpg output/ses.mp3 output/video.mp4 music shorts_
      - name: Thumbnail üret
        run: python scripts/generate_thumbnail.py output/tema.json output/baslik.txt output/thumbnail.jpg

      - name: Thumbnail üret
        run: python scripts/generate_thumbnail.py output/tema.json output/baslik.txt output/thumbnail.jpg

      - name: Thumbnail üret
        run: python scripts/generate_thumbnail.py output/tema.json output/baslik.txt output/thumbnail.jpg

      - name: Videoyu artifact olarak sakla
        uses: actions/upload-artifact@v4
        with:
          name: video-cikti
          path: output/
          retention-days: 14

      - name: Tema geçmişini kaydet
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add scripts/tema_gecmisi_shorts.json
          git diff --staged --quiet || git commit -m "tema gecmisi guncellendi [skip ci]"
          git push

      - name: Tema geçmişini kaydet
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add scripts/tema_gecmisi_shorts.json
          git diff --staged --quiet || git commit -m "tema gecmisi guncellendi [skip ci]"
          git push

  onay_ve_yukleme:
    needs: generate
    runs-on: ubuntu-latest
    environment: youtube-upload
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: video-cikti
          path: output/

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları kur
        run: pip install google-api-python-client google-auth google-auth-oauthlib

      - name: YouTube'a yükle
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: python scripts/upload_youtube.py output/video.mp4 output/baslik.txt output/aciklama.txt output/thumbnail.jpg output/playlist_id.txt

  bildirim:
    needs: [generate, onay_ve_yukleme]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Hata bildirimi gönder
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ BA Stories Shorts üretim hatası%0A%0AWorkflow: ${{ github.workflow }}%0ARun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}%0A%0AHatayı incelemek için linke tıkla."