name: BA Stories - Shorts Üretim

on:
  schedule:
    # Pazartesi, Çarşamba, Perşembe, Cumartesi, Pazar - 09:00 TR saati (UTC 06:00)
    - cron: '0 6 * * 1,3,4,6,0'
  workflow_dispatch: {}

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları kur
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install edge-tts requests

      - name: Kısa senaryo yaz (Groq)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/generate_script_shorts.py

      - name: Seslendirme üret (Edge-TTS)
        run: python scripts/generate_tts.py output/senaryo.txt output/ses.mp3

      - name: Thumbnail/görsel üret
        run: python scripts/generate_thumbnail.py output/tema.json output/baslik.txt output/thumbnail.jpg

      - name: Short'u kurgula (Ken Burns efekti, FFmpeg)
        run: python scripts/assemble_video_shorts.py output/thumbnail.jpg output/ses.mp3 output/video.mp4

      - name: Thumbnail üret
        run: python scripts/generate_thumbnail.py output/tema.json output/baslik.txt output/thumbnail.jpg

      - name: Thumbnail üret
        run: python scripts/generate_thumbnail.py output/tema.json output/baslik.txt output/thumbnail.jpg

      - name: Thumbnail üret
        run: python scripts/generate_thumbnail.py output/tema.json output/baslik.txt output/thumbnail.jpg

      - name: Videoyu artifact olarak sakla
        uses: actions/upload-artifact@v4
        with:
          name: video-cikti
          path: output/
          retention-days: 14

  onay_ve_yukleme:
    needs: generate
    runs-on: ubuntu-latest
    environment: youtube-upload
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: video-cikti
          path: output/

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları kur
        run: pip install google-api-python-client google-auth google-auth-oauthlib

      - name: YouTube'a yükle
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: python scripts/upload_youtube.py output/video.mp4 output/baslik.txt output/aciklama.txt output/thumbnail.jpg